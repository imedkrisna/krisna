# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/

# Appearance
appearance:
  mode: system
  color: emerald
  font: serif

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: "Personal website of Krisna 'imed' Gupta — economist, researcher, lecturer"
    twitter: 'iMedKrisna'
  analytics:
    google_analytics: 'G-7W1RMKLQWV'
    microsoft_clarity: '4jjx66fdyg'
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    show_search: true
    show_theme_chooser: true
    show_language: true
    logo:
      text: "Krisna 'imed' Gupta"

# Site footer
footer:
  copyright:
    notice: '© {year} Krisna Gupta. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: true
      share_alike: true
      allow_commercial: true

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: true
  privacy_pack:
    enable: false

# Security
hugoblox:
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""
